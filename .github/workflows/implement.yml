name: Implement feedback via Claude

on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: github.event.label.name == 'implement'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          label_trigger: implement
          model: claude-opus-4-5
          direct_prompt: |
            Zaimplementuj następującą zmianę na stronie demo (index.html):

            TYTUŁ: ${{ github.event.issue.title }}

            OPIS:
            ${{ github.event.issue.body }}

            Wprowadź zmiany w index.html, commituj i pushuj branch.

      - name: Auto-create PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          BRANCH=$(git ls-remote --heads origin "refs/heads/claude/issue-${ISSUE_NUM}-*" | awk '{print $2}' | sed 's|refs/heads/||' | head -1)
          if [ -z "$BRANCH" ]; then
            echo "Brak brancha Claude, pomijam tworzenie PR"
            exit 0
          fi
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq 'length')
          if [ "$EXISTING" -gt "0" ]; then
            echo "PR już istnieje"
            exit 0
          fi
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "${{ github.event.issue.title }}" \
            --body "Closes #${ISSUE_NUM}"
          echo "✅ PR utworzony automatycznie"
